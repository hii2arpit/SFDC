<template>
    <lightning-card>
    <div class="slds-p-around_medium">
        <div class="slds-p-around_Medium">
            <lightning-input type="search"
                onchange={fetchBooksHandler}
                label="Search for Books"
                value={query}>
            </lightning-input>
        </div>
        <lightning-layout multiple-rows>
            <template if:true={books}>
                <template for:each={books} for:item="book">
                    <lightning-layout-item size="3" padding="around-small" key={book.id}>
                            <div class="slds-box slds-p-around_medium slds-text-align_center">
                                <img src={book.thumbnail} height="200px" alt="Book Thumbnail" />
                                <div class="slds-test-headling_small slds-p-vertical_medium"><strong>{book.title}</strong></div>
                                <div><strong>Published Date: {book.publishedDate}</strong></div>
                                <div><strong>Publisher: {book.publisher}</strong></div>
                            </div>
                    </lightning-layout-item>
                </template>
            </template>
        </lightning-layout>

    </div>
    </lightning-card>
</template>
